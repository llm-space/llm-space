name: Release

# Cut releases by pushing a `v*` tag (use `bun run release` / `release:canary`,
# which bumps apps/desktop/package.json, updates CHANGELOG.md, commits and tags).
# A `-canary` suffix in the tag selects the canary channel; otherwise stable.
#
# Jobs: meta (validate tag) → build (macOS arm64 + x64: sign, notarize,
# smoke-test; Windows x64: unsigned for now, see the win smoke step) → publish.
# Artifacts land in two places:
#   - the rolling `updates` release — the machine-readable update feed the
#     in-app updater polls (`release.baseUrl` in electrobun.config.ts)
#   - a versioned release per tag — DMGs + changelog for humans

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build, e.g. v0.1.0-canary.1"
        required: true

permissions:
  contents: write

# Patch generation diffs against the currently published version, so releases
# must not run concurrently.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  meta:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      channel: ${{ steps.meta.outputs.channel }}
    steps:
      # Tag names may contain shell metacharacters — never interpolate them
      # into `run:` scripts via ${{ }}; pass them through `env:` instead.
      - name: Resolve tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Validate tag and derive channel
        id: meta
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          PKG_VERSION="$(jq -r .version apps/desktop/package.json)"
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag $TAG does not match apps/desktop/package.json version $PKG_VERSION"
            exit 1
          fi
          case "$VERSION" in
            *-canary*) CHANNEL="canary" ;;
            *) CHANNEL="stable" ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

  build:
    needs: meta
    strategy:
      matrix:
        include:
          - runner: macos-15
            os: macos
            arch: arm64
          - runner: macos-15-intel
            os: macos
            arch: x64
          - runner: windows-latest
            os: win
            arch: x64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.meta.outputs.tag }}

      # v4: reads mise.lock (installs the exact locked bun with checksum
      # verification); its [env]→GITHUB_ENV export excludes PATH entries and
      # our [env] carries nothing else.
      - uses: jdx/mise-action@v4

      - run: bun install --frozen-lockfile

      # Bundle ripgrep for the built-in `grep` tool — stock Windows has no rg.
      # Version-pinned; electrobun.config.ts `build.copy` picks the file up.
      - name: Download ripgrep (Windows)
        if: matrix.os == 'win'
        shell: pwsh
        working-directory: apps/desktop
        run: |
          $version = "14.1.1"
          $zip = "ripgrep-$version-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Force -Path resources/win | Out-Null
          Invoke-WebRequest -Uri "https://github.com/BurntSushi/ripgrep/releases/download/$version/$zip.zip" -OutFile "$env:RUNNER_TEMP/rg.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP/rg.zip" -DestinationPath "$env:RUNNER_TEMP/rg"
          Copy-Item "$env:RUNNER_TEMP/rg/$zip/rg.exe" resources/win/rg.exe
          & resources/win/rg.exe --version

      - name: Import signing certificate
        if: matrix.os == 'macos'
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN_PWD="$(uuidgen)"
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" build.keychain
          # Keep the keychain unlocked for long notarization waits (6h).
          security set-keychain-settings -lut 21600 build.keychain
          rm certificate.p12
          IDENTITY="$(security find-identity -v -p codesigning build.keychain \
            | grep 'Developer ID Application' | head -1 | sed -E 's/.*"(.+)"/\1/')"
          if [ -z "$IDENTITY" ]; then
            echo "::error::no Developer ID Application identity in certificate"
            exit 1
          fi
          echo "::add-mask::$IDENTITY"
          echo "ELECTROBUN_DEVELOPER_ID=$IDENTITY" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        if: matrix.os == 'macos'
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/asc_api_key.p8"
          printf '%s' "$ASC_API_KEY_P8" > "$KEY_PATH"
          echo "ELECTROBUN_APPLEAPIKEYPATH=$KEY_PATH" >> "$GITHUB_ENV"

      # electrobun's createTar shells out to `tar -cf` with no format flag, and
      # the runner's bsdtar defaults to "restricted pax": any path >100 chars
      # (e.g. hashed font assets) gets a pax extended header, which electrobun's
      # zig self-extractor cannot parse (TarUnsupportedFileType — install dies
      # mid-extraction). Force ustar, whose prefix field covers those paths and
      # which the extractor fully supports; build-win-installer.ts validates
      # the payload tar so any regression fails loudly at packaging time.
      - name: Force ustar tar creation (Windows extractor compat)
        if: matrix.os == 'win'
        shell: pwsh
        run: |
          $shimDir = Join-Path $env:RUNNER_TEMP "tar-ustar-shim"
          New-Item -ItemType Directory -Force -Path $shimDir | Out-Null
          $lines = @(
            '@echo off',
            'if "%~1"=="-cf" (',
            '  C:\Windows\System32\tar.exe --format=ustar %*',
            ') else (',
            '  C:\Windows\System32\tar.exe %*',
            ')'
          )
          Set-Content -Path (Join-Path $shimDir "tar.cmd") -Value $lines -Encoding ascii
          Add-Content $env:GITHUB_PATH $shimDir

      # Windows ships unsigned for now (SmartScreen shows "More info → Run
      # anyway" on first install; auto-updates never re-prompt). SignPath
      # Foundation OSS signing lands with the first stable Windows release.
      - name: Build, sign and notarize
        working-directory: apps/desktop
        shell: bash
        env:
          ELECTROBUN_APPLEAPIKEY: ${{ secrets.ASC_API_KEY_ID }}
          ELECTROBUN_APPLEAPIISSUER: ${{ secrets.ASC_API_ISSUER_ID }}
          CHANNEL: ${{ needs.meta.outputs.channel }}
        run: bun run "build:$CHANNEL"

      - name: Smoke test the signed app
        if: matrix.os == 'macos'
        working-directory: apps/desktop
        env:
          CHANNEL: ${{ needs.meta.outputs.channel }}
          ARCH: ${{ matrix.arch }}
        run: |
          APP="$(find "build/$CHANNEL-macos-$ARCH" -maxdepth 1 -name '*.app' | head -1)"
          if [ -z "$APP" ]; then
            echo "::error::no .app bundle found in build/$CHANNEL-macos-$ARCH"
            exit 1
          fi
          codesign --verify --deep --strict "$APP"
          spctl -a -t exec -vv "$APP"
          xcrun stapler validate "$APP"
          # The bundle left in build/ is the self-extracting installer wrapper
          # (the real app only exists inside the tar.zst): on first launch it
          # swaps the real app into the same bundle path and relaunches it.
          # Launch it and require a live process from that path well after
          # extraction has finished — a signed-but-corrupted binary dies
          # instantly (electrobun#485 on x64; scripts/fix-x64-headerpad.ts is
          # the workaround this gates), so this covers the whole
          # extract→relaunch user path on both architectures.
          open "$APP"
          sleep 25
          pgrep -f "$APP/Contents/MacOS/" > /dev/null || {
            echo "::error::app did not stay alive after launch"
            exit 1
          }
          pkill -f "$APP/Contents/MacOS/" || true

      # The update feed consumes the raw electrobun artifacts unchanged; the
      # NSIS installer below only replaces the Setup zip as the human-facing
      # download. Validate the feed artifact set first.
      - name: Validate update-feed artifacts (Windows)
        if: matrix.os == 'win'
        shell: pwsh
        working-directory: apps/desktop
        run: |
          $setupZip = Get-ChildItem artifacts -Filter "*-Setup*.zip"
          $tarZst = Get-ChildItem artifacts -Filter "*.tar.zst"
          $updateJson = Get-ChildItem artifacts -Filter "*update.json"
          if (-not $setupZip -or -not $tarZst -or -not $updateJson) {
            Write-Error "missing Windows artifacts (Setup zip / tar.zst / update.json)"
            exit 1
          }
          Get-Content $updateJson[0].FullName | ConvertFrom-Json | Out-Null

      # windows-latest images ship NSIS, but don't depend on that quietly.
      - name: Ensure NSIS
        if: matrix.os == 'win'
        shell: pwsh
        run: |
          if (Get-Command makensis -ErrorAction SilentlyContinue) {
            makensis /VERSION
          } else {
            choco install nsis -y --no-progress
            # PATH additions only reach later steps; verify via the absolute
            # path here (build-win-installer.ts also falls back to it).
            Add-Content $env:GITHUB_PATH "C:\Program Files (x86)\NSIS"
            & "C:\Program Files (x86)\NSIS\makensis.exe" /VERSION
          }

      # Wrap the electrobun console self-extractor in the GUI installer
      # (shortcuts, Add/Remove Programs entry, uninstaller); see
      # apps/desktop/installer/llm-space.nsi.
      - name: Package NSIS installer (Windows)
        if: matrix.os == 'win'
        shell: pwsh
        working-directory: apps/desktop
        env:
          CHANNEL: ${{ needs.meta.outputs.channel }}
        run: bun run build:win-installer --channel $env:CHANNEL

      # Silent install must establish the exact updater-contract layout +
      # shortcuts + uninstall entry; silent uninstall must remove all of it
      # while preserving user data.
      - name: Smoke test installer (Windows)
        if: matrix.os == 'win'
        shell: pwsh
        working-directory: apps/desktop
        env:
          CHANNEL: ${{ needs.meta.outputs.channel }}
        run: ./scripts/smoke-win-installer.ps1 -Channel $env:CHANNEL

      - uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.os }}-${{ matrix.arch }}
          path: apps/desktop/artifacts/
          if-no-files-found: error

      - name: Clean up keychain
        if: always() && matrix.os == 'macos'
        run: security delete-keychain build.keychain || true

  publish:
    needs: [meta, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.meta.outputs.tag }}

      - uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true

      - name: Publish update feed (rolling `updates` release)
        working-directory: artifacts
        run: |
          gh release view updates --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1 || \
            gh release create updates --repo "$GITHUB_REPOSITORY" --prerelease \
              --title "Update feed" \
              --notes "Machine-readable update feed polled by the in-app updater. Download installers from the versioned releases instead."
          # Upload order is load-bearing: update.json is the update trigger and
          # must land last, after the patches and tarballs it points at —
          # across both architectures.
          shopt -s nullglob
          for f in *.patch; do
            gh release upload updates "$f" --repo "$GITHUB_REPOSITORY" --clobber
          done
          gh release upload updates *.tar.zst --repo "$GITHUB_REPOSITORY" --clobber
          gh release upload updates *update.json --repo "$GITHUB_REPOSITORY" --clobber

      - name: Publish versioned release
        env:
          TAG: ${{ needs.meta.outputs.tag }}
          CHANNEL: ${{ needs.meta.outputs.channel }}
        run: |
          # Static notes only. No changelog extraction and no --generate-notes:
          # both list commits/authors and a "New Contributors" section, which
          # we deliberately don't surface.
          NOTES="Download the DMG (macOS) or the LLMSpace-Setup exe (Windows) below. Existing installs update in place. Windows builds are unsigned for now: SmartScreen may show a warning on first install — choose \"More info\" → \"Run anyway\"."
          PRERELEASE_ARGS=()
          if [ "$CHANNEL" = "canary" ]; then
            PRERELEASE_ARGS=(--prerelease)
          fi
          # Always (re)set the static notes — edit if the release already
          # exists (e.g. a re-run, or a leftover from an earlier tag) so it
          # never keeps stale auto-generated notes.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes "$NOTES"
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" --notes "$NOTES" "${PRERELEASE_ARGS[@]}"
          fi
          gh release upload "$TAG" artifacts/*.dmg \
            --repo "$GITHUB_REPOSITORY" --clobber
          # Windows: the NSIS installer (LLMSpace-Setup*.exe) is the
          # human-facing download; the raw electrobun Setup zip stays a
          # build-artifact-only debugging aid.
          shopt -s nullglob
          WIN_SETUP=(artifacts/LLMSpace-Setup*.exe)
          if [ ${#WIN_SETUP[@]} -gt 0 ]; then
            gh release upload "$TAG" "${WIN_SETUP[@]}" \
              --repo "$GITHUB_REPOSITORY" --clobber
          fi

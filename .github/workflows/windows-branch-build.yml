name: Windows branch build

# Build-only pipeline for Windows-port verification: produces an installable
# unsigned canary win-x64 build from a branch, WITHOUT touching the update
# feed or any release. Grab the artifact from the run page and follow
# docs/windows-manual-test.md. Delete this workflow once Windows ships in the
# regular tag-driven release flow.

on:
  push:
    branches: ["feat/windows-release"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-branch-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: jdx/mise-action@v4

      - run: bun install --frozen-lockfile

      - name: Download ripgrep
        shell: pwsh
        working-directory: apps/desktop
        run: |
          $version = "14.1.1"
          $zip = "ripgrep-$version-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Force -Path resources/win | Out-Null
          Invoke-WebRequest -Uri "https://github.com/BurntSushi/ripgrep/releases/download/$version/$zip.zip" -OutFile "$env:RUNNER_TEMP/rg.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP/rg.zip" -DestinationPath "$env:RUNNER_TEMP/rg"
          Copy-Item "$env:RUNNER_TEMP/rg/$zip/rg.exe" resources/win/rg.exe
          & resources/win/rg.exe --version

      - name: Build (unsigned canary)
        working-directory: apps/desktop
        shell: bash
        run: bun run build:canary

      - name: Validate artifacts
        shell: pwsh
        working-directory: apps/desktop
        run: |
          $setupZip = Get-ChildItem artifacts -Filter "*-Setup*.zip"
          if (-not $setupZip) {
            Write-Error "no Setup zip produced"
            exit 1
          }
          Get-ChildItem artifacts | Format-Table Name, Length

      # windows-latest images ship NSIS, but don't depend on that quietly.
      - name: Ensure NSIS
        shell: pwsh
        run: |
          if (-not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            choco install nsis -y --no-progress
            Add-Content $env:GITHUB_PATH "C:\Program Files (x86)\NSIS"
          }
          makensis /VERSION

      # Wrap the electrobun console self-extractor in the GUI installer
      # (shortcuts, Add/Remove Programs entry, uninstaller); see
      # apps/desktop/installer/llm-space.nsi.
      - name: Package NSIS installer
        shell: pwsh
        working-directory: apps/desktop
        run: bun run build:win-installer --channel canary

      # The machine-verifiable acceptance gate: silent install must establish
      # the exact updater-contract layout + shortcuts + uninstall entry, and
      # silent uninstall must remove all of it while preserving user data.
      - name: Smoke test installer (silent install/uninstall)
        shell: pwsh
        working-directory: apps/desktop
        run: ./scripts/smoke-win-installer.ps1 -Channel canary

      # Primary artifact: the NSIS installer testers should download.
      - uses: actions/upload-artifact@v7
        with:
          name: llm-space-win-x64-canary
          path: apps/desktop/artifacts/LLMSpace-Setup-canary.exe
          if-no-files-found: error
          retention-days: 14

      # Secondary: the raw electrobun output (Setup zip, tar.zst, update.json)
      # for debugging the packaging itself.
      - uses: actions/upload-artifact@v7
        with:
          name: llm-space-win-x64-canary-electrobun-raw
          path: apps/desktop/artifacts/
          if-no-files-found: error
          retention-days: 14
